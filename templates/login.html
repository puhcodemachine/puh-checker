<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ПУХ · Checker — вход</title>
<style>
  :root{
    --bg:#0a0e14; --bg2:#0e141d; --card:#121925; --line:#1f2a3a;
    --txt:#e6edf3; --muted:#7d8da3; --accent:#32c266; --accent2:#179a50;
    --danger:#ff6b6b;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:'Inter',ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--txt); background:radial-gradient(1200px 700px at 70% -10%, #10302a 0%, transparent 55%),
                radial-gradient(900px 600px at -10% 110%, #103a2e 0%, transparent 50%), var(--bg);
    display:grid; place-items:center; min-height:100dvh; padding:24px;
  }
  .wrap{width:100%; max-width:392px}
  .brand{display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:26px}
  .logo{
    width:46px;height:46px;border-radius:12px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#04110c;font-weight:800;font-size:22px;font-family:'JetBrains Mono',ui-monospace,monospace;
    box-shadow:0 8px 30px rgba(34,160,86,.25);
  }
  .brand b{font-size:20px;letter-spacing:.5px}
  .brand span{display:block;font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
  .card{
    background:linear-gradient(180deg, rgba(255,255,255,.02), transparent), var(--card);
    border:1px solid var(--line); border-radius:18px; padding:30px 28px 28px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.6); backdrop-filter:blur(8px);
  }
  .card h1{font-size:17px;margin:0 0 4px}
  .card p.sub{margin:0 0 22px;color:var(--muted);font-size:13px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 7px;letter-spacing:.3px}
  .field{margin-bottom:16px}
  input{
    width:100%;padding:13px 14px;border-radius:11px;border:1px solid var(--line);
    background:#0c121b;color:var(--txt);font-size:14.5px;outline:none;transition:.15s;
    font-family:inherit;
  }
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(34,160,86,.12)}
  input::placeholder{color:#465468}
  button{
    width:100%;margin-top:6px;padding:13px;border:0;border-radius:11px;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04110c;
    font-weight:700;font-size:14.5px;letter-spacing:.3px;transition:.15s;
  }
  button:hover{filter:brightness(1.06);transform:translateY(-1px)}
  button:active{transform:translateY(0)}
  .error{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.35);
    color:var(--danger);font-size:13px;padding:10px 12px;border-radius:10px;margin-bottom:16px}
  .foot{margin-top:18px;text-align:center;color:var(--muted);font-size:11.5px;
    font-family:'JetBrains Mono',ui-monospace,monospace}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);
    margin-right:6px;box-shadow:0 0 8px var(--accent);vertical-align:middle}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo">П</div>
      <div><b>ПУХ · CHECKER</b><span>seed recovery panel</span></div>
    </div>
    <form class="card" method="post" action="/login" autocomplete="off">
      <h1>Вход в панель</h1>
      <p class="sub">Доступ только для владельца</p>
      {{ERROR}}
      <div class="field">
        <label for="username">Логин</label>
        <input id="username" name="username" placeholder="Puh" autofocus>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" placeholder="••••••••••">
      </div>
      <button type="submit">Войти →</button>
    </form>
    <div class="foot"><span class="dot"></span>защищённое соединение · v1.0</div>
  </div>
</body>
</html>
